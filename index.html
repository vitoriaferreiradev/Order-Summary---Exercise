<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
</head>
<body>
    <main>
        
        <section class="summary-order">

            <div class="summary-order__header">
                <img src="images/illustration-hero.svg" alt="">
            </div><!--summary-order__header-->

            <div class="summary-order__info">

                <div class="summary-order__description">
                    <h2>Order Summary</h2>
                    <p>You can now listen to millions of songs, audiobooks,and podcasts on any device anywhere you like!</p>
                </div>

                <div class="summary-order-plan">
                    <img src="images/icon-music.svg" alt="">

                    <div class="plan-info">
                        <h3>Annual Plan</h3>
                        <p>$59.99/year</p>
                    </div>

                    <a href="#">Change</a>
                </div>

            </div><!--summary-order__info-->

            <button id="submit-btn" type="submit">Proceed to Payment</button>
            <a id="cancel-btn" href="#">Cancel Order</a>


            <div class="summary-order__payment">

            </div><!--summary-order__payment-->

        </section><!--summary-order-->
    </main>
</body>
</html>
